name: Deploy portfolio to Azure

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'public/**'
      - 'data/**'
      - 'scripts/**'
      - 'infra/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.mjs'
      - 'postcss.config.mjs'
      - 'tsconfig.json'
      - 'mdx-components.*'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

# One deploy at a time. We don't cancel an in-flight one because the latter
# half (terraform apply) makes data-plane changes and abandoning it mid-flight
# is messier than just letting it finish.
concurrency:
  group: deploy-portfolio
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # required so the runner can mint a GH OIDC token to exchange for an Azure AAD token via the MI's federated credential

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Pulls in vars + secrets from the `prod` environment:
    #   - vars.AZURE_CLIENT_ID, vars.AZURE_TENANT_ID, vars.AZURE_SUBSCRIPTION_ID
    #     identify the user-assigned MI `managed-identity` in rg and the
    #     Azure subscription the deploy targets.
    #   - secrets.TF_API_TOKEN is the HCP Terraform user/team token used to
    #     read/write state on the sunny-portfolio workspace (TFC is now in
    #     Local execution mode — TFC stores state, this runner does the apply).
    # The MI's federated-credential subject is
    #   repo:sunnybharne/sunnybharne:environment:prod
    # so this `environment:` field is what lets the OIDC handshake succeed.
    environment: prod

    env:
      # Azure auth on the runner: OIDC. With `id-token: write` granted, the
      # runner has ACTIONS_ID_TOKEN_REQUEST_URL/_TOKEN, and the azurerm
      # provider exchanges that GH OIDC token for an Azure AAD token via
      # the MI's federated credential.
      ARM_USE_OIDC: 'true'
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # HCP Terraform backend auth (state read/write).
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

      # subscription_id is also a Terraform input variable.
      TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        # `prebuild` runs scripts/fetch-videos.mjs so the build always picks
        # up the latest YouTube data committed to data/videos.json.
        run: npm run build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.15.3'
          # `terraform_wrapper: false` so subsequent steps see the raw
          # exit code rather than the wrapper's structured output.
          terraform_wrapper: false

      # All terraform commands run from the repo root with `-chdir=infra`.
      # The TFC workspace's working-directory attribute is set to `infra`,
      # so the upload tarball includes the whole repo (and therefore ./out
      # from the build step), while terraform itself executes inside infra/.
      - name: terraform init
        run: terraform -chdir=infra init -input=false

      - name: terraform plan
        run: terraform -chdir=infra plan -input=false -out=tfplan

      - name: terraform apply
        run: terraform -chdir=infra apply -input=false -auto-approve tfplan
