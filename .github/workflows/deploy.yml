name: Deploy portfolio to Azure

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'public/**'
      - 'data/**'
      - 'scripts/**'
      - 'infra/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.mjs'
      - 'postcss.config.mjs'
      - 'tsconfig.json'
      - 'mdx-components.*'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

# One deploy at a time. We don't cancel an in-flight one because the latter
# half (terraform apply) makes data-plane changes and abandoning it mid-flight
# is messier than just letting it finish.
concurrency:
  group: deploy-portfolio
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      # HCP Terraform (Terraform Cloud) backend auth. Create a team or user
      # API token in TFC and store it as a repo secret.
      #
      # Azure auth itself happens INSIDE TFC (Remote execution): TFC issues
      # OIDC tokens on behalf of the run, and the managed identity
      # `managed-identity` in rg has federated-credentials trusting TFC's
      # issuer for run_phase=plan and run_phase=apply on this workspace.
      # The runner here just needs to talk to TFC; the actual Azure
      # principal-of-record is the MI, not anything on this runner.
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        # `prebuild` runs scripts/fetch-videos.mjs so the build always picks
        # up the latest YouTube data committed to data/videos.json.
        run: npm run build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.15.3'
          # `terraform_wrapper: false` so subsequent steps see the raw
          # exit code rather than the wrapper's structured output.
          terraform_wrapper: false

      # IMPORTANT: terraform runs from the repo root with `-chdir=infra`,
      # not `working-directory: infra`. The TFC workspace has its
      # working-directory attribute set to `infra`, so this combination
      # uploads the entire repo (including ./out from the build step) to
      # TFC, then executes inside ./infra remotely. If we ran from
      # ./infra here, TFC would receive only the infra dir and the blob
      # uploads would all be no-ops because ../out wouldn't exist on the
      # remote.
      - name: terraform init
        run: terraform -chdir=infra init -input=false

      - name: terraform plan
        run: terraform -chdir=infra plan -input=false -out=tfplan

      - name: terraform apply
        run: terraform -chdir=infra apply -input=false -auto-approve tfplan
