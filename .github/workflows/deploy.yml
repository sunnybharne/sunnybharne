name: Deploy portfolio to Azure

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'public/**'
      - 'data/**'
      - 'scripts/**'
      - 'infra/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.mjs'
      - 'postcss.config.mjs'
      - 'tsconfig.json'
      - 'mdx-components.*'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

# One deploy at a time. We don't cancel an in-flight one because the latter
# half (terraform apply) makes data-plane changes and abandoning it mid-flight
# is messier than just letting it finish.
concurrency:
  group: deploy-portfolio
  cancel-in-progress: false

permissions:
  id-token: write   # required for Azure OIDC federation
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      # Azure provider auth via OIDC. The user-assigned managed identity
      # must have a federated credential configured for
      # repo:sunnybharne/sunnybharne:ref:refs/heads/main. The same MI can
      # be reused from the stjs setup — just add another federated
      # credential entry to it.
      ARM_USE_OIDC: 'true'
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # HCP Terraform (Terraform Cloud) backend auth. Create a team or user
      # API token in TFC and store it as a repo secret.
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

      # subscription_id is also a Terraform input variable.
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        # `prebuild` runs scripts/fetch-videos.mjs so the build always picks
        # up the latest YouTube data committed to data/videos.json.
        run: npm run build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.15.3'
          # `terraform_wrapper: false` so subsequent steps see the raw
          # exit code rather than the wrapper's structured output.
          terraform_wrapper: false

      - name: terraform init
        working-directory: infra
        run: terraform init -input=false

      # Plan separately so the apply step can surface what's about to change.
      # On a stable site this is mostly content-only diffs in the $web blobs.
      - name: terraform plan
        working-directory: infra
        run: terraform plan -input=false -out=tfplan

      - name: terraform apply
        working-directory: infra
        run: terraform apply -input=false -auto-approve tfplan
