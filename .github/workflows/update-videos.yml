name: Update YouTube videos

on:
  schedule:
    # Daily at 06:00 UTC. README + data/videos.json refresh from @SunnySideCode.
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest videos
        run: node scripts/fetch-videos.mjs

      - name: Commit changes (if any)
        run: |
          if git diff --quiet -- README.md data/videos.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/videos.json
          git commit -m "chore: refresh latest YouTube videos"
          git push
